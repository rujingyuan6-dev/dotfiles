# ============================================
# tmux 配置
# ============================================

# 使用 Ctrl+A 作为前缀键（默认 Ctrl+B，但 A 按起来顺手）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 快捷键：重复按前缀键两次 = 发送 Ctrl+A
bind a send-prefix

# 分屏
bind | split-window -h      # 水平分屏（前缀 + |）
bind - split-window -v      # 垂直分屏（前缀 + -）
bind h select-pane -L       # 方向切换
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整窗格大小（前缀 + H/J/K/L 大写的）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 窗口切换（前缀 + 数字）
bind -r 0 select-window -t 0
bind -r 1 select-window -t 1
bind -r 2 select-window -t 2
bind -r 3 select-window -t 3
bind -r 4 select-window -t 4
bind -r 5 select-window -t 5
bind -r 6 select-window -t 6
bind -r 7 select-window -t 7
bind -r 8 select-window -t 8
bind -r 9 select-window -t 9

# 鼠标支持（滚动、点击切换窗格、拖动调整大小）
set -g mouse on

# 允许使用鼠标滚轮在终端内滚动（进入复制模式）
bind -n WheelUpPane if-shell -F -t = "#{mouse_hyperlink}" "" "select-pane -t =; copy-mode -e; send-keys -X scroll-up -5"
bind -n WheelDownPane select-pane -t = \; send-keys -N 5 -X scroll-down

# 256 色
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q'
set -g focus-events on

# 状态栏美化
set -g status-bg "colour235"
set -g status-fg "colour250"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=green]#S #[fg=yellow]| #[fg=cyan]#(whoami)@#h"
set -g status-right "#[fg=cyan]%m/%d %H:%M"
set -g window-status-current-style "fg=black,bg=green"
set -g window-status-style "fg=colour250,bg=colour235"
set -g status-interval 5

# 新窗口/窗格在当前目录打开
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# 重新加载配置（前缀 + r）
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# 复制模式使用 vim 快捷键
set -g mode-keys vi

# 把选中的文本复制到系统剪贴板（需要 xclip）
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# 会话管理
bind C-c new-session          # 创建新会话
bind L switch-client -l       # 切换上一个会话
